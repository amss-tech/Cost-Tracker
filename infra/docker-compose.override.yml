# Supabase self-hosted overrides for Tusco ES
#
# Place this file alongside docker-compose.yml in the supabase/docker directory
# (or symlink it there). Docker Compose automatically merges it.
#
# What this does:
#   - Tells PostgREST to expose both schemas so Cost-Tracker (public)
#     and Esticomms (esticomms) can each use the same Supabase instance.
#   - Sets the Postgres port to NOT be publicly exposed (Kong is the gateway).

version: '3.8'

services:
  # PostgREST: expose both schemas
  rest:
    environment:
      PGRST_DB_SCHEMAS: "public,esticomms"
      PGRST_DB_EXTRA_SEARCH_PATH: "public,extensions"

  # Postgres: do not expose 5432 publicly — access only via Kong or internal Docker network
  db:
    ports: !reset []   # remove the default 5432:5432 mapping

  # Kong: expose on 8000 (HTTP only — Caddy handles HTTPS termination)
  kong:
    ports:
      - "127.0.0.1:8000:8000"  # bind to localhost only; Caddy forwards to it
      - "127.0.0.1:8443:8443"
